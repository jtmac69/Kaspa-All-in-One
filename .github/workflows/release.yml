name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  publish-images:
    name: Publish Images (${{ matrix.service }})
    runs-on: ubuntu-latest
    # arm64 QEMU builds for heavy Node.js images (kaspa-explorer) can exceed
    # the GHA default 6h limit. Cap at 90min so the job fails loudly rather
    # than silently cancelling the whole workflow.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: wizard
            context: services/wizard
            dockerfile: services/wizard/Dockerfile
          - service: dashboard
            context: services/dashboard
            dockerfile: services/dashboard/Dockerfile
          - service: kasia
            context: services/kasia
            dockerfile: services/kasia/Dockerfile
          - service: k-social
            context: services/k-social
            dockerfile: services/k-social/Dockerfile
          # k-indexer excluded: clones external repo + full Rust compile
          - service: kaspa-explorer
            context: services/kaspa-explorer
            dockerfile: services/kaspa-explorer/Dockerfile
          - service: kaspa-stratum
            context: services/kaspa-stratum
            dockerfile: services/kaspa-stratum/Dockerfile
          - service: simply-kaspa-indexer
            context: services/simply-kaspa-indexer
            dockerfile: services/simply-kaspa-indexer/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kaspa-aio-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-installers:
    name: Build Installer (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-deb
            os: ubuntu-latest
            dist_script: dist:linux
            artifact_pattern: "services/tray/dist/*.deb"

          - name: macos-dmg
            os: macos-latest
            dist_script: dist:mac
            artifact_pattern: "services/tray/dist/*.dmg"

          - name: windows-exe
            os: windows-latest
            dist_script: dist:win
            artifact_pattern: "services/tray/dist/*.exe"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install tray dependencies
        run: npm install
        working-directory: services/tray

      - name: Create placeholder icons (if real icons not present)
        if: runner.os != 'macOS'
        run: node scripts/create-placeholder-icons.js
        working-directory: services/tray

      - name: Create placeholder icons + icns (macOS)
        if: runner.os == 'macOS'
        run: |
          node scripts/create-placeholder-icons.js
          bash scripts/create-icns.sh
        working-directory: services/tray

      - name: Build installer
        run: npm run ${{ matrix.dist_script }}
        working-directory: services/tray
        env:
          # Code signing — silently skipped by electron-builder when not set.
          # Configure these secrets in GitHub repository settings for signed releases.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Only gate on build-installers — Docker image publishing runs in parallel
    # and can take 1-2h for arm64 QEMU builds. The GitHub Release (tarball +
    # installers) should not be blocked by image publishing.
    needs: [build-installers]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download installer artifacts
        uses: actions/download-artifact@v8
        with:
          # Explicitly name the three installer artifacts; pattern:"*" also
          # matches internal .dockerbuild cache artifacts which are not
          # downloadable and cause the step to fail.
          pattern: "{linux-deb,macos-dmg,windows-exe}"
          path: release-artifacts
          merge-multiple: true

      - name: Build release tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="kaspa-aio-${VERSION}.tar.gz"
          tar czf "/tmp/${ARCHIVE}" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*/node_modules' \
            .
          mv "/tmp/${ARCHIVE}" "./${ARCHIVE}"
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect installer files into an array to avoid word-splitting on paths with spaces
          # and to catch the case where build-installers produced no output files.
          mapfile -t INSTALLERS < <(find release-artifacts/ \( -name "*.deb" -o -name "*.dmg" -o -name "*.exe" \) 2>/dev/null | sort)
          echo "Found ${#INSTALLERS[@]} installer(s): ${INSTALLERS[*]:-none}"
          if [ "${#INSTALLERS[@]}" -eq 0 ]; then
            echo "Error: no installer files found in release-artifacts/ — aborting release." >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
            "kaspa-aio-${VERSION}.tar.gz" \
            "kaspa-aio-${VERSION}.tar.gz.sha256" \
            "${INSTALLERS[@]}"
