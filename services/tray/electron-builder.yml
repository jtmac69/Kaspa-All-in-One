appId: com.kaspa-aio.tray
productName: "Kaspa AIO"
copyright: "Copyright © 2025 Kaspa AIO Contributors"

directories:
  output: dist
  buildResources: build

files:
  - main.js
  - "src/**/*"
  - "assets/**/*"
  - "node_modules/**/*"

linux:
  target:
    - target: deb
      arch:
        - x64
        - arm64
  category: Network
  icon: assets/icon.png
  desktop:
    Name: Kaspa AIO
    Comment: Kaspa blockchain infrastructure manager
    Categories: Network;
  beforeInstall: "../../installer/linux/pre-install.sh"
  afterInstall: "../../installer/linux/post-install.sh"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
