appId: com.kaspa-aio.tray
productName: "Kaspa AIO"
copyright: "Copyright © 2025 Kaspa AIO Contributors"

directories:
  output: dist
  buildResources: build

files:
  - main.js
  - "src/**/*"
  - "assets/**/*"
  - "node_modules/**/*"

linux:
  target:
    - target: deb
      arch:
        - x64
        - arm64
  category: Network
  icon: assets/icon.png
  desktop:
    Name: Kaspa AIO
    Comment: Kaspa blockchain infrastructure manager
    Categories: Network;

deb:
  # electron-builder's afterInstall field reads the script and substitutes
  # ${...} patterns as macro templates, which breaks scripts containing bash
  # variable syntax (e.g. dpkg-query -f='${Version}').  Pass both hooks via
  # fpm directly so the scripts are forwarded as-is without templating.
  fpm:
    - "--before-install=../../installer/linux/pre-install.sh"
    - "--after-install=../../installer/linux/post-install.sh"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  icon: assets/icon.icns
  # identity: null skips code signing when CSC_LINK is not configured.
  # Remove this line and set CSC_LINK/CSC_KEY_PASSWORD secrets for signed releases.
  identity: null
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
